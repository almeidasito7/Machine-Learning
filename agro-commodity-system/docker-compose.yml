version: '3.8'

services:
  backend:
    build: ./backend
    container_name: agro-commodity-backend
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: agro-commodity-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

networks:
  default:
    name: agro-network
